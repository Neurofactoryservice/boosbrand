<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
  body{margin:0;width:1200px;height:630px;overflow:hidden;
        background:#100800;
        font-family:'Space Grotesk',system-ui,sans-serif;color:#f1f5f9;
        display:flex;align-items:center;padding:60px;
        background-image:radial-gradient(ellipse at 20% 50%,#f9731622 0%,transparent 60%)}
  h1{font-size:72px;font-weight:900;letter-spacing:-3px;line-height:1;margin-bottom:20px}
  p{font-size:32px;color:rgba(241,245,249,0.6);max-width:700px;line-height:1.4}
  .badge{display:inline-block;padding:8px 20px;background:#f9731633;
           border:2px solid #f9731666;
           border-radius:50px;font-size:24px;margin-bottom:24px}
  .emoji{font-size:100px;position:absolute;right:80px;top:50%;transform:translateY(-50%)}
</style>
</head>
<body>
  <div>
    <div class="badge">Emailing & Automation</div>
    <h1>BoosBrand</h1>
    <p>La solution emailing & automation qui change tout</p>
  </div>
  <div class="emoji">📧</div>
</body>
</html>
